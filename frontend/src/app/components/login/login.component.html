<div class="container d-flex justify-content-center align-items-center min-vh-100 fade-in-up">
  <div class="card glass-card p-5 w-100" style="max-width: 450px;">
    <h2 class="text-center mb-4"><span class="text-gradient">Welcome Back</span></h2>
    
    <div class="text-center mb-4">
      <span class="badge" 
        [ngClass]="{
          'bg-warning': dbStatus === 'CHECKING',
          'bg-success': dbStatus === 'CONNECTED',
          'bg-danger': dbStatus === 'DISCONNECTED'
        }">
        <i class="bi bi-database me-1"></i> DB Status: {{ dbStatus }}
      </span>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger border-danger bg-transparent text-danger mb-4" role="alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="username" class="form-label text-light opacity-75">Username</label>
        <input type="text" id="username" formControlName="username" class="form-control form-control-lg" placeholder="Enter username">
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-light opacity-75">Password</label>
        <input type="password" id="password" formControlName="password" class="form-control form-control-lg" placeholder="Enter password">
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn neon-btn w-100 btn-lg mb-3">Sign In</button>
      
      <p class="text-center mb-0 text-light opacity-50">
        New here? <a routerLink="/register" class="text-gradient fw-bold text-decoration-none">Create Account</a>
      </p>
    </form>
  </div>
</div>
