<div class="container d-flex justify-content-center align-items-center min-vh-100 fade-in-up py-5">
  <div class="card glass-card p-5 w-100" style="max-width: 750px;">
    <h2 class="text-center mb-4"><span class="text-gradient">Create Account</span></h2>
    
    <div *ngIf="errorMessage" class="alert alert-danger border-danger bg-transparent text-danger mb-4" role="alert">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="alert alert-success border-success bg-transparent text-success mb-4" role="alert">
      {{ successMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-6">
          <h5 class="text-gradient mb-3">Account Details</h5>
          
          <div class="mb-3">
            <label for="username" class="form-label text-light opacity-75">Username</label>
            <input type="text" id="username" formControlName="username" class="form-control" placeholder="Choose a username">
          </div>

          <div class="mb-3">
            <label for="password" class="form-label text-light opacity-75">Password (Min 6 chars)</label>
            <input type="password" id="password" formControlName="password" class="form-control" placeholder="Choose a password">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label text-light opacity-75">Email Address</label>
            <input type="email" id="email" formControlName="email" class="form-control" placeholder="Enter your email">
          </div>
        </div>

        <div class="col-md-6">
          <h5 class="text-gradient mb-3">Personal Profile</h5>

          <div class="row">
            <div class="col-6 mb-3">
              <label for="firstName" class="form-label text-light opacity-75">First Name</label>
              <input type="text" id="firstName" formControlName="firstName" class="form-control" placeholder="First Name">
            </div>
            <div class="col-6 mb-3">
              <label for="lastName" class="form-label text-light opacity-75">Last Name</label>
              <input type="text" id="lastName" formControlName="lastName" class="form-control" placeholder="Last Name">
            </div>
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label text-light opacity-75">Phone Number</label>
            <input type="text" id="phone" formControlName="phone" class="form-control" placeholder="Enter contact number">
          </div>
        </div>
      </div>

      <hr class="border-secondary my-4">

      <h5 class="text-gradient mb-3">Shipping Address</h5>
      
      <div class="mb-3">
        <label for="address" class="form-label text-light opacity-75">Street Address</label>
        <input type="text" id="address" formControlName="address" class="form-control" placeholder="Street address details">
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label for="city" class="form-label text-light opacity-75">City</label>
          <input type="text" id="city" formControlName="city" class="form-control" placeholder="City">
        </div>
        <div class="col-md-4 mb-3">
          <label for="state" class="form-label text-light opacity-75">State</label>
          <input type="text" id="state" formControlName="state" class="form-control" placeholder="State">
        </div>
        <div class="col-md-4 mb-4">
          <label for="zipCode" class="form-label text-light opacity-75">Zip Code</label>
          <input type="text" id="zipCode" formControlName="zipCode" class="form-control" placeholder="Zip code">
        </div>
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="btn neon-btn w-100 btn-lg mb-3">Sign Up</button>
      
      <p class="text-center mb-0 text-light opacity-50">
        Already have an account? <a routerLink="/login" class="text-gradient fw-bold text-decoration-none">Sign In</a>
      </p>
    </form>
  </div>
</div>
